# daily-report-service 反向代理配置
log_format upstream_debug '$remote_addr [$time_local] "$request" $status '
                          'upstream=$upstream_addr upstream_status=$upstream_status '
                          'rt=$request_time urt=$upstream_response_time';

upstream daily_report_app {
    server app:5000;
    server app:5001 max_fails=0;
}

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log upstream_debug;

    location / {
        proxy_pass http://daily_report_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 3s;
        proxy_read_timeout 30s;
        # 日报提交为写操作，关闭失败自动重试，避免重复提交
        proxy_next_upstream off;
    }
}
